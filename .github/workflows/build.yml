name: Build, Package & Release

"on":
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read

env:
  BUILD_DIR: build
  PRODUCT_NAME: Stutter

jobs:
  build:
    name: Build & Validate (macOS universal)
    runs-on: macos-14
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_name: ${{ steps.package.outputs.zip_name }}
    env:
      HAS_SIGNING_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Resolved version is empty (ref: ${GITHUB_REF})"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Cache JUCE FetchContent (build/_deps)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: ${{ runner.os }}-juce-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-juce-deps-

      - name: Configure (CMake, universal binary, Release)
        run: |
          cmake -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DSTUTTER_COPY_PLUGIN=OFF \
            -DSTUTTER_BUILD_TESTS=ON

      - name: Build
        run: cmake --build "${BUILD_DIR}" --config Release -j8

      - name: Run render_test (offline DSP regression harness)
        run: |
          set -euo pipefail
          RENDER_TEST_BIN="${BUILD_DIR}/tools/render_test/render_test"
          if [[ ! -f "$RENDER_TEST_BIN" ]]; then
            echo "::error::render_test binary not found at ${RENDER_TEST_BIN}"
            exit 1
          fi
          RENDER_TEST_OUT="${RUNNER_TEMP}/render_test"
          mkdir -p "$RENDER_TEST_OUT"
          if ! "$RENDER_TEST_BIN" "$RENDER_TEST_OUT"; then
            echo "::error::render_test reported failures (see log above)"
            exit 1
          fi

      - name: Verify universal binary (lipo)
        run: |
          set -euo pipefail
          ARTEFACT_DIR="${BUILD_DIR}/Stutter_artefacts/Release"
          VST3_BIN="${ARTEFACT_DIR}/VST3/${PRODUCT_NAME}.vst3/Contents/MacOS/${PRODUCT_NAME}"
          AU_BIN="${ARTEFACT_DIR}/AU/${PRODUCT_NAME}.component/Contents/MacOS/${PRODUCT_NAME}"
          APP_BIN="${ARTEFACT_DIR}/Standalone/${PRODUCT_NAME}.app/Contents/MacOS/${PRODUCT_NAME}"

          check_universal() {
            local bin="$1"
            local label="$2"
            if [[ ! -f "$bin" ]]; then
              echo "::error::${label} binary not found at ${bin}"
              exit 1
            fi
            local archs
            archs="$(lipo -archs "$bin")"
            echo "${label}: ${archs}"
            if [[ "$archs" != *"arm64"* || "$archs" != *"x86_64"* ]]; then
              echo "::error::${label} is not a universal (arm64+x86_64) binary: ${archs}"
              exit 1
            fi
          }

          check_universal "$VST3_BIN" "VST3"
          check_universal "$AU_BIN" "AU"
          check_universal "$APP_BIN" "Standalone"

      - name: Download pluginval
        run: |
          set -euo pipefail
          PLUGINVAL_URL="$(gh api repos/Tracktion/pluginval/releases/latest \
            --jq '.assets[] | select(.name == "pluginval_macOS.zip") | .browser_download_url')"
          if [[ -z "$PLUGINVAL_URL" ]]; then
            echo "::error::Could not resolve pluginval_macOS.zip download URL from latest release"
            exit 1
          fi
          echo "Downloading pluginval from: ${PLUGINVAL_URL}"

          DOWNLOAD_OK=false
          for attempt in 1 2 3; do
            if curl -sSfL -o pluginval.zip "$PLUGINVAL_URL"; then
              DOWNLOAD_OK=true
              break
            fi
            echo "Download attempt ${attempt} failed, retrying in 5s..."
            sleep 5
          done
          if [[ "$DOWNLOAD_OK" != "true" ]]; then
            echo "::error::Failed to download pluginval after 3 attempts"
            exit 1
          fi

          ditto -x -k pluginval.zip pluginval_extracted
          chmod +x pluginval_extracted/pluginval.app/Contents/MacOS/pluginval
          echo "$(pwd)/pluginval_extracted/pluginval.app/Contents/MacOS" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate VST3 with pluginval
        run: |
          set -euo pipefail
          VST3_PATH="${BUILD_DIR}/Stutter_artefacts/Release/VST3/${PRODUCT_NAME}.vst3"
          pluginval --strictness-level 8 --validate "$VST3_PATH"

      - name: Validate AU with auval
        run: |
          set -euo pipefail
          AU_BUNDLE="${BUILD_DIR}/Stutter_artefacts/Release/AU/${PRODUCT_NAME}.component"
          if [[ ! -d "$AU_BUNDLE" ]]; then
            echo "::error::AU bundle not found at ${AU_BUNDLE}"
            exit 1
          fi

          # auval only scans components registered under ~/Library/Audio/Plug-Ins/Components,
          # so copy the freshly built bundle there and force Core Audio to re-scan (killing
          # AudioComponentRegistrar makes it re-enumerate on the next auval launch).
          AU_DEST_DIR="$HOME/Library/Audio/Plug-Ins/Components"
          mkdir -p "$AU_DEST_DIR"
          ditto "$AU_BUNDLE" "${AU_DEST_DIR}/${PRODUCT_NAME}.component"
          killall -9 AudioComponentRegistrar 2>/dev/null || true

          # macos-14 GitHub Actions runners are known to lag registering newly copied AU
          # components, so retry a few times before failing the job.
          AUVAL_OK=false
          for attempt in 1 2 3; do
            if auval -v aufx Stt1 Manx; then
              AUVAL_OK=true
              break
            fi
            echo "auval attempt ${attempt} failed, retrying in 5s..."
            sleep 5
          done
          if [[ "$AUVAL_OK" != "true" ]]; then
            echo "::error::auval failed to validate the AU component (aufx Stt1 Manx) after 3 attempts"
            exit 1
          fi

      # --- Developer ID signing / notarization (template) ---
      # The import/codesign/notarize steps run only if the MACOS_CERT_P12
      # secret has been configured. Until then they are skipped entirely and
      # the job still succeeds using the ad-hoc signature produced by the
      # JUCE build. Step order matters: codesign runs BEFORE packaging so the
      # zip always contains the final (Developer ID or ad-hoc) signatures,
      # and notarization submits that same zip.
      - name: Import Developer ID certificate
        if: ${{ github.event_name != 'pull_request' && env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          EXISTING_KEYCHAINS=()
          while IFS= read -r line; do
            EXISTING_KEYCHAINS+=("$(tr -d '"' <<< "$line" | xargs)")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${EXISTING_KEYCHAINS[@]}"

      - name: Codesign with Developer ID
        if: ${{ github.event_name != 'pull_request' && env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          ARTEFACT_DIR="${BUILD_DIR}/Stutter_artefacts/Release"
          for target in \
            "${ARTEFACT_DIR}/VST3/${PRODUCT_NAME}.vst3" \
            "${ARTEFACT_DIR}/AU/${PRODUCT_NAME}.component" \
            "${ARTEFACT_DIR}/Standalone/${PRODUCT_NAME}.app"; do
            codesign --force --deep --timestamp --options runtime \
              --sign "$MACOS_SIGNING_IDENTITY" "$target"
          done

      # Package always runs (signing steps above may have been skipped), so
      # the zip contains whichever signature the bundles currently carry.
      - name: Package (zip)
        id: package
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          STAGE_DIR="$(mktemp -d)/${PRODUCT_NAME}"
          ZIP_NAME="${PRODUCT_NAME}-${VERSION}-macOS.zip"
          ARTEFACT_DIR="${BUILD_DIR}/Stutter_artefacts/Release"

          mkdir -p "$STAGE_DIR"
          cp -R "${ARTEFACT_DIR}/VST3/${PRODUCT_NAME}.vst3" "$STAGE_DIR/"
          cp -R "${ARTEFACT_DIR}/AU/${PRODUCT_NAME}.component" "$STAGE_DIR/"
          cp -R "${ARTEFACT_DIR}/Standalone/${PRODUCT_NAME}.app" "$STAGE_DIR/"
          cp README.md "$STAGE_DIR/"

          ditto -c -k --keepParent "$STAGE_DIR" "$ZIP_NAME"

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${ZIP_NAME}"
          unzip -l "$ZIP_NAME"

      - name: Notarize
        if: ${{ github.event_name != 'pull_request' && env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          set -euo pipefail
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          xcrun notarytool submit "$ZIP_NAME" \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD" \
            --wait
          # TODO: stapler staple — notarytool staples bundles, not zips.
          # After notarization succeeds, unpack the zip, run
          # `xcrun stapler staple` on each bundle (.vst3/.component/.app),
          # then re-create the zip with ditto so the ticket ships offline.
          # Implement once real Developer ID credentials exist.
      # --- end Developer ID signing / notarization template ---

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: dist

      - name: Verify zip present
        id: locate
        env:
          ZIP_NAME: ${{ needs.build.outputs.zip_name }}
        run: |
          set -euo pipefail
          ZIP_PATH="dist/${ZIP_NAME}"
          if [[ ! -f "$ZIP_PATH" ]]; then
            # Fallback: search in case the artifact layout ever changes.
            ZIP_PATH="$(find dist -name "${ZIP_NAME}" -maxdepth 2 | head -n1)"
          fi
          if [[ -z "$ZIP_PATH" || ! -f "$ZIP_PATH" ]]; then
            echo "::error::Packaged zip ${ZIP_NAME} not found in downloaded artifacts"
            exit 1
          fi
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ steps.locate.outputs.zip_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
